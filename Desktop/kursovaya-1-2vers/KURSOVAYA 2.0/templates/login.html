{% extends "base.html" %}

{% block title %}Вход — StockFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title" style="font-size: 1.5rem; text-align: center;">Вход в систему</h1>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
            </form>
            <div class="text-center mt-4">
                <a href="{{ url_for('register') }}" style="color: #667eea; text-decoration: none; font-size: 0.875rem;">
                    Нет аккаунта? Зарегистрироваться
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
