{% extends "base.html" %}

{% block title %}Вход — StockFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title" style="font-size: 1.5rem; text-align: center;">Вход в систему</h1>
            <p style="text-align: center; color: #718096; font-size: 0.875rem; margin-top: 0.5rem;">
                Используйте тестовые учетные записи
            </p>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
            </form>

            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
                <p style="text-align: center; font-size: 0.75rem; color: #a0aec0;">
                    Тестовые пользователи: admin / admin123 | moderator / mod123 | user / user123
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
