{% extends "base.html" %}

{% block title %}Регистрация — StockFlow{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title" style="font-size: 1.5rem; text-align: center;">Регистрация</h1>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="form-group">
                    <label class="form-label">Логин *</label>
                    <input type="text" name="username" class="form-control" required placeholder="3-20 символов">
                </div>
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль *</label>
                    <input type="password" name="password" class="form-control" required placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label class="form-label">ФИО</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label class="form-label">Отдел</label>
                    <input type="text" name="department" class="form-control" placeholder="Производство, Склад...">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
            </form>
            <div class="text-center mt-4">
                <a href="{{ url_for('login') }}" style="color: #667eea; text-decoration: none; font-size: 0.875rem;">
                    Уже есть аккаунт? Войти
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
